
# MySQL local database (require MySQL server and database/user created)
spring.datasource.url=jdbc:mysql://localhost:3306/zoo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=aluno
spring.datasource.password=aluno
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Explicit Hibernate dialect to avoid autodetection errors
# Use the generic MySQL dialect compatible with the Hibernate version in the project
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Also set Jakarta persistence URL to ensure Hibernate can read JDBC metadata
jakarta.persistence.jdbc.url=jdbc:mysql://localhost:3306/zoo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Server port (optional)
# server.port=8080

